/* ---------- shaders ---------- */
const VS = `#version 300 es
void main(){
  vec2 p = vec2(float((gl_VertexID << 1) & 2), float(gl_VertexID & 2));
  gl_Position = vec4(p * 2.0 - 1.0, 0.0, 1.0);
}`;

/* Buffer A — the actual render (faithful port) */
const RENDER_FS = `#version 300 es
precision highp float;
precision highp int;

uniform vec2  iResolution;   // render buffer resolution
uniform float iTime;
uniform vec2  uMouse;        // normalized [0,1], (0,0) = never touched
uniform float uDragging;     // 1 while pointer held (Shadertoy iMouse.z > 1)
uniform float uBlend;        // TAA history weight when not dragging
uniform int   uIters;
uniform sampler2D uNoise;    // 256x256 RGBA, g = r shifted (iq layout)
uniform sampler2D uDust;     // bark/organic color texture
uniform sampler2D uPrev;     // previous frame (TAA history)

out vec4 fragColor;

const vec3 MainColor = vec3(1.0);
const float pi = 3.14159265;

float fIters() { return float(uIters); }

// noise code by iq
float noise( in vec3 x )
{
    vec3 p = floor(x);
    vec3 f = fract(x);
    f = f*f*(3.0-2.0*f);
    vec2 uv = (p.xy+vec2(37.0,17.0)*p.z) + f.xy;
    vec2 rg = textureLod( uNoise, (uv+ 0.5)/256.0, 0.0 ).yx;
    return -1.0+2.0*mix( rg.x, rg.y, f.z );
}

float saturate(float x) { return clamp(x, 0.0, 1.0); }
vec3  saturate(vec3 x)  { return clamp(x, vec3(0.0), vec3(1.0)); }

float rand(vec2 coord)
{
    return saturate(fract(sin(dot(coord, vec2(12.9898, 78.223))) * 43758.5453));
}

float pcurve( float x, float a, float b )
{
    float k = pow(a+b,a+b) / (pow(a,a)*pow(b,b));
    return k * pow( x, a ) * pow( 1.0-x, b );
}

float atan2(float y, float x)
{
    if (x > 0.0)       return atan(y / x);
    else if (x == 0.0) return y > 0.0 ? pi/2.0 : (y < 0.0 ? -pi/2.0 : 0.0);
    else               return y >= 0.0 ? atan(y/x) + pi : atan(y/x) - pi;
}

float sdTorus(vec3 p, vec2 t)
{
    vec2 q = vec2(length(p.xz) - t.x, p.y);
    return length(q)-t.y;
}

void Haze(inout vec3 color, vec3 pos, float alpha)
{
    vec2 t = vec2(1.0, 0.01);
    float torusDist = length(sdTorus(pos + vec3(0.0, -0.05, 0.0), t));
    float bloomDisc = 1.0 / (pow(torusDist, 2.0) + 0.001);
    vec3 col = MainColor;
    bloomDisc *= length(pos) < 0.5 ? 0.0 : 1.0;
    color += col * bloomDisc * (2.9 / fIters()) * (1.0 - alpha * 1.0);
}

void GasDisc(inout vec3 color, inout float alpha, vec3 pos)
{
    float discRadius = 3.2;
    float discWidth = 5.3;
    float discInner = discRadius - discWidth * 0.5;

    vec3 origin = vec3(0.0);
    vec3 discNormal = normalize(vec3(0.0, 1.0, 0.0));
    float discThickness = 0.1;

    float distFromCenter = distance(pos, origin);
    float distFromDisc = dot(discNormal, pos - origin);

    float radialGradient = 1.0 - saturate((distFromCenter - discInner) / discWidth * 0.5);

    float coverage = pcurve(radialGradient, 4.0, 0.9);

    discThickness *= radialGradient;
    coverage *= saturate(1.0 - abs(distFromDisc) / discThickness);

    vec3 dustColorLit = MainColor;

    float dustGlow = 1.0 / (pow(1.0 - radialGradient, 2.0) * 290.0 + 0.002);
    vec3 dustColor = dustColorLit * dustGlow * 8.2;

    coverage = saturate(coverage * 0.7);

    float fade = pow((abs(distFromCenter - discInner) + 0.4), 4.0) * 0.04;
    float bloomFactor = 1.0 / (pow(distFromDisc, 2.0) * 40.0 + fade + 0.00002);
    vec3 b = dustColorLit * pow(bloomFactor, 1.5);

    b *= mix(vec3(1.7, 1.1, 1.0), vec3(0.5, 0.6, 1.0), vec3(pow(radialGradient, 2.0)));
    b *= mix(vec3(1.7, 0.5, 0.1), vec3(1.0), vec3(pow(radialGradient, 0.5)));

    dustColor = mix(dustColor, b * 150.0, saturate(1.0 - coverage * 1.0));
    coverage = saturate(coverage + bloomFactor * bloomFactor * 0.1);

    if (coverage < 0.01)
    {
        return;
    }

    vec3 radialCoords;
    radialCoords.x = distFromCenter * 1.5 + 0.55;
    radialCoords.y = atan2(-pos.x, -pos.z) * 1.5;
    radialCoords.z = distFromDisc * 1.5;

    radialCoords *= 0.95;

    float speed = 0.06;

    float noise1 = 1.0;
    vec3 rc = radialCoords + 0.0;               rc.y += iTime * speed;
    noise1 *= noise(rc * 3.0) * 0.5 + 0.5;      rc.y -= iTime * speed;
    noise1 *= noise(rc * 6.0) * 0.5 + 0.5;      rc.y += iTime * speed;
    noise1 *= noise(rc * 12.0) * 0.5 + 0.5;     rc.y -= iTime * speed;
    noise1 *= noise(rc * 24.0) * 0.5 + 0.5;     rc.y += iTime * speed;

    float noise2 = 2.0;
    rc = radialCoords + 30.0;
    noise2 *= noise(rc * 3.0) * 0.5 + 0.5;      rc.y += iTime * speed;
    noise2 *= noise(rc * 6.0) * 0.5 + 0.5;      rc.y -= iTime * speed;
    noise2 *= noise(rc * 12.0) * 0.5 + 0.5;     rc.y += iTime * speed;
    noise2 *= noise(rc * 24.0) * 0.5 + 0.5;     rc.y -= iTime * speed;
    noise2 *= noise(rc * 48.0) * 0.5 + 0.5;     rc.y += iTime * speed;
    noise2 *= noise(rc * 92.0) * 0.5 + 0.5;     rc.y -= iTime * speed;

    dustColor *= noise1 * 0.998 + 0.002;
    coverage *= noise2;

    radialCoords.y += iTime * speed * 0.5;

    dustColor *= pow(texture(uDust, radialCoords.yx * vec2(0.15, 0.27)).rgb, vec3(2.0)) * 4.0;

    coverage = saturate(coverage * 1200.0 / fIters());
    dustColor = max(vec3(0.0), dustColor);

    coverage *= pcurve(radialGradient, 4.0, 0.9);

    color = (1.0 - alpha) * dustColor * coverage + color;
    alpha = (1.0 - alpha) * coverage + alpha;
}

vec3 rotate(vec3 p, float x, float y, float z)
{
    mat3 matx = mat3(1.0, 0.0, 0.0,
                     0.0, cos(x), sin(x),
                     0.0, -sin(x), cos(x));
    mat3 maty = mat3(cos(y), 0.0, -sin(y),
                     0.0, 1.0, 0.0,
                     sin(y), 0.0, cos(y));
    mat3 matz = mat3(cos(z), sin(z), 0.0,
                     -sin(z), cos(z), 0.0,
                     0.0, 0.0, 1.0);
    p = matx * p;
    p = matz * p;
    p = maty * p;
    return p;
}

void RotateCamera(inout vec3 eyevec, inout vec3 eyepos)
{
    float mousePosY = uMouse.y;
    float mousePosX = uMouse.x;

    vec3 angle = vec3(mousePosY * 0.05 + 0.05, 1.0 + mousePosX * 1.0, -0.45);

    eyevec = rotate(eyevec, angle.x, angle.y, angle.z);
    eyepos = rotate(eyepos, angle.x, angle.y, angle.z);
}

void WarpSpace(inout vec3 eyevec, inout vec3 raypos)
{
    vec3 origin = vec3(0.0);

    float singularityDist = distance(raypos, origin);
    float warpFactor = 1.0 / (pow(singularityDist, 2.0) + 0.000001);

    vec3 singularityVector = normalize(origin - raypos);

    float warpAmount = 5.0;

    eyevec = normalize(eyevec + singularityVector * warpFactor * warpAmount / fIters());
}

void main()
{
    vec2 fragCoord = gl_FragCoord.xy;
    vec2 uv = fragCoord / iResolution.xy;

    float aspect = iResolution.x / iResolution.y;

    float taaOn = 1.0 - uDragging;   // Shadertoy: (iMouse.z > 1.0 ? 0.0 : 1.0)

    vec2 uveye = uv;
    uveye.x += (rand(uv + sin(iTime * 1.0)) / iResolution.x) * taaOn;
    uveye.y += (rand(uv + 1.0 + sin(iTime * 1.0)) / iResolution.y) * taaOn;

    vec3 eyevec = normalize(vec3((uveye * 2.0 - 1.0) * vec2(aspect, 1.0), 6.0));
    vec3 eyepos = vec3(0.0, -0.0, -10.0);

    vec2 mousepos = uMouse;
    if (mousepos.x == 0.0)
    {
        mousepos.x = 0.35;
    }
    eyepos.x += mousepos.x * 3.0 - 1.5;

    const float far = 15.0;

    RotateCamera(eyevec, eyepos);

    vec3 color = vec3(0.0);

    float dither = rand(uv + sin(iTime * 1.0) * taaOn) * 2.0;

    float alpha = 0.0;
    vec3 raypos = eyepos + eyevec * dither * far / fIters();
    for (int i = 0; i < uIters; i++)
    {
        WarpSpace(eyevec, raypos);
        raypos += eyevec * far / fIters();
        GasDisc(color, alpha, raypos);
        Haze(color, raypos, alpha);
    }

    color *= 0.0001;

    // Temporal accumulation (p == 1.0 in the original, so the pows are identity)
    vec3 previous = texture(uPrev, uv).rgb;
    float blendWeight = uBlend * taaOn;
    color = mix(color, previous, blendWeight);

    fragColor = vec4(saturate(color), 1.0);
}`;

/* Box downsample (replaces the atlas oversampling) */
const DOWN_FS = `#version 300 es
precision highp float;
uniform sampler2D uTex;
uniform vec2 uOutRes;
out vec4 fragColor;
void main(){
  vec2 uv = gl_FragCoord.xy / uOutRes;
  vec2 ts = 1.0 / vec2(textureSize(uTex, 0));
  vec3 c = vec3(0.0);
  c += texture(uTex, uv + ts * vec2(-0.5, -0.5)).rgb;
  c += texture(uTex, uv + ts * vec2( 0.5, -0.5)).rgb;
  c += texture(uTex, uv + ts * vec2(-0.5,  0.5)).rgb;
  c += texture(uTex, uv + ts * vec2( 0.5,  0.5)).rgb;
  fragColor = vec4(c * 0.25, 1.0);
}`;

/* Separable gaussian, original kernel (half-offset trick preserved) */
const BLUR_FS = `#version 300 es
precision highp float;
uniform sampler2D uTex;
uniform vec2 uOutRes;
uniform vec2 uDir;         // (1,0) or (0,1)
out vec4 fragColor;
void main(){
  float weights[5];
  float offsets[5];
  weights[0] = 0.19638062; weights[1] = 0.29675293; weights[2] = 0.09442139;
  weights[3] = 0.01037598; weights[4] = 0.00025940;
  offsets[0] = 0.00000000; offsets[1] = 1.41176471; offsets[2] = 3.29411765;
  offsets[3] = 5.17647059; offsets[4] = 7.05882353;

  vec2 uv = gl_FragCoord.xy / uOutRes;
  vec3 color = texture(uTex, uv).rgb * weights[0];
  float weightSum = weights[0];
  for (int i = 1; i < 5; i++) {
    vec2 off = (offsets[i] / uOutRes) * uDir * 0.5;
    color += texture(uTex, uv + off).rgb * weights[i];
    color += texture(uTex, uv - off).rgb * weights[i];
    weightSum += weights[i] * 2.0;
  }
  fragColor = vec4(color / weightSum, 1.0);
}`;

/* Final composite: scene + bicubic bloom, tonemap (faithful port) */
const COMPOSITE_FS = `#version 300 es
precision highp float;
uniform sampler2D uScene;
uniform sampler2D uB0; uniform sampler2D uB1; uniform sampler2D uB2; uniform sampler2D uB3;
uniform sampler2D uB4; uniform sampler2D uB5; uniform sampler2D uB6; uniform sampler2D uB7;
uniform vec2 uOutRes;
out vec4 fragColor;

vec3 saturate(vec3 x) { return clamp(x, vec3(0.0), vec3(1.0)); }

vec4 cubic(float x)
{
    float x2 = x * x;
    float x3 = x2 * x;
    vec4 w;
    w.x =   -x3 + 3.0*x2 - 3.0*x + 1.0;
    w.y =  3.0*x3 - 6.0*x2       + 4.0;
    w.z = -3.0*x3 + 3.0*x2 + 3.0*x + 1.0;
    w.w =  x3;
    return w / 6.0;
}

vec3 BicubicTexture(sampler2D tex, vec2 coord)
{
    vec2 resolution = vec2(textureSize(tex, 0));
    coord *= resolution;
    float fx = fract(coord.x);
    float fy = fract(coord.y);
    coord.x -= fx;
    coord.y -= fy;
    fx -= 0.5;
    fy -= 0.5;
    vec4 xcubic = cubic(fx);
    vec4 ycubic = cubic(fy);
    vec4 c = vec4(coord.x - 0.5, coord.x + 1.5, coord.y - 0.5, coord.y + 1.5);
    vec4 s = vec4(xcubic.x + xcubic.y, xcubic.z + xcubic.w, ycubic.x + ycubic.y, ycubic.z + ycubic.w);
    vec4 offset = c + vec4(xcubic.y, xcubic.w, ycubic.y, ycubic.w) / s;
    vec3 sample0 = texture(tex, vec2(offset.x, offset.z) / resolution).rgb;
    vec3 sample1 = texture(tex, vec2(offset.y, offset.z) / resolution).rgb;
    vec3 sample2 = texture(tex, vec2(offset.x, offset.w) / resolution).rgb;
    vec3 sample3 = texture(tex, vec2(offset.y, offset.w) / resolution).rgb;
    float sx = s.x / (s.x + s.y);
    float sy = s.z / (s.z + s.w);
    return mix( mix(sample3, sample2, sx), mix(sample1, sample0, sx), sy);
}

vec3 GetBloom(vec2 uv)
{
    vec3 bloom = vec3(0.0);
    bloom += BicubicTexture(uB0, uv) * 1.0;
    bloom += BicubicTexture(uB1, uv) * 1.5;
    bloom += BicubicTexture(uB2, uv) * 1.0;
    bloom += BicubicTexture(uB3, uv) * 1.5;
    bloom += BicubicTexture(uB4, uv) * 1.8;
    bloom += BicubicTexture(uB5, uv) * 1.0;
    bloom += BicubicTexture(uB6, uv) * 1.0;
    bloom += BicubicTexture(uB7, uv) * 1.0;
    return bloom;
}

void main()
{
    vec2 uv = gl_FragCoord.xy / uOutRes;

    vec3 color = texture(uScene, uv).rgb;

    color += GetBloom(uv) * 0.08;

    color *= 200.0;

    // Tonemapping and color grading
    color = pow(color, vec3(1.5));
    color = color / (1.0 + color);
    color = pow(color, vec3(1.0 / 1.5));

    color = mix(color, color * color * (3.0 - 2.0 * color), vec3(1.0));
    color = pow(color, vec3(1.3, 1.20, 1.0));
    color = saturate(color * 1.01);

    color = pow(color, vec3(0.7 / 2.2));
    fragColor = vec4(color, 1.0);
}`;

/* ---------- boilerplate ---------- */
const canvas = document.getElementById('c');
const debugEl = document.getElementById('debug');
const hintEl = document.getElementById('hint');
const failEl = document.getElementById('fail');

const params = new URLSearchParams(location.search);
const DEBUG = params.has('debug');
if (DEBUG) debugEl.style.display = 'block';

const gl = canvas.getContext('webgl2', {
  antialias: false, alpha: false, depth: false, stencil: false,
  powerPreference: 'high-performance', preserveDrawingBuffer: false,
});

function fail() { failEl.style.display = 'flex'; canvas.style.display = 'none'; }

if (!gl) { fail(); throw new Error('no webgl2'); }
const extCBF = gl.getExtension('EXT_color_buffer_float');
const extCBHF = gl.getExtension('EXT_color_buffer_half_float');
if (!extCBF && !extCBHF) { fail(); throw new Error('no float render targets'); }

function compile(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s), src);
    throw new Error('shader compile failed');
  }
  return s;
}
function program(fsSrc) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, VS));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    throw new Error('link failed');
  }
  const uniforms = {};
  const n = gl.getProgramParameter(p, gl.ACTIVE_UNIFORMS);
  for (let i = 0; i < n; i++) {
    const info = gl.getActiveUniform(p, i);
    uniforms[info.name] = gl.getUniformLocation(p, info.name);
  }
  return { p, u: uniforms };
}

const progRender = program(RENDER_FS);
const progDown = program(DOWN_FS);
const progBlur = program(BLUR_FS);
const progComposite = program(COMPOSITE_FS);

const vao = gl.createVertexArray(); // empty; vertices from gl_VertexID
gl.bindVertexArray(vao);

/* ---------- static textures ---------- */
/* iq's RGBA noise layout: green(x,y) = red(x-37, y-17), so that the
   z-slice interpolation in noise() is continuous. */
function makeNoiseTexture() {
  const N = 256;
  const R = new Uint8Array(N * N);
  for (let i = 0; i < R.length; i++) R[i] = (Math.random() * 256) | 0;
  const data = new Uint8Array(N * N * 4);
  for (let y = 0; y < N; y++) {
    for (let x = 0; x < N; x++) {
      const i = (y * N + x) * 4;
      data[i]     = R[y * N + x];
      data[i + 1] = R[((y - 17 + N) & 255) * N + ((x - 37 + N) & 255)];
      data[i + 2] = (Math.random() * 256) | 0;
      data[i + 3] = (Math.random() * 256) | 0;
    }
  }
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, N, N, 0, gl.RGBA, gl.UNSIGNED_BYTE, data);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
  return t;
}
const noiseTex = makeNoiseTexture();

/* Dust texture: starts as neutral gray so the scene renders immediately,
   swapped for the bark image once it decodes. */
const dustTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, dustTex);
gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, 1, 1, 0, gl.RGBA, gl.UNSIGNED_BYTE,
              new Uint8Array([150, 140, 125, 255]));
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);
{
  const img = new Image();
  img.onload = () => {
    gl.bindTexture(gl.TEXTURE_2D, dustTex);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA8, gl.RGBA, gl.UNSIGNED_BYTE, img);
    gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
    gl.generateMipmap(gl.TEXTURE_2D);
    gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR_MIPMAP_LINEAR);
    state.resetAccum = true;
  };
  img.src = BARK_DATA_URI;
}

/* ---------- render targets ---------- */
function makeTarget(w, h) {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const f = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, t, 0);
  const ok = gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  if (!ok) { fail(); throw new Error('fbo incomplete'); }
  return { tex: t, fbo: f, w, h };
}
function delTarget(t) { gl.deleteTexture(t.tex); gl.deleteFramebuffer(t.fbo); }

/* ---------- state ---------- */
const coarse = window.matchMedia('(pointer: coarse)').matches;
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

let tier = params.has('tier')
  ? Math.max(0, Math.min(3, parseInt(params.get('tier'), 10) || 0))
  : (coarse ? 1 : 0);
if (reducedMotion) tier = 3;
const tierForced = params.has('tier');

const state = {
  ping: null, pong: null,           // buffer A ping-pong
  bloomD: [], bloomT: [],           // per-level downsample + blur-temp targets
  renderW: 0, renderH: 0,
  mouse: [0, 0],                    // normalized, (0,0) = untouched (Shadertoy default)
  dragging: false,
  frame: 0,
  resetAccum: false,
  frozen: false,
  lastDraw: 0,
  t0: performance.now(),
  // auto-tier measurement
  dts: [], lastT: 0, stepdowns: 0, measureStart: 30,
};

function rebuild() {
  const T = TIERS[tier];
  const dpr = Math.min(window.devicePixelRatio || 1, T.dprCap);
  const cw = Math.max(1, Math.round(canvas.clientWidth * dpr));
  const ch = Math.max(1, Math.round(canvas.clientHeight * dpr));
  canvas.width = cw;
  canvas.height = ch;

  const rw = Math.max(1, Math.round(cw * T.scale));
  const rh = Math.max(1, Math.round(ch * T.scale));
  state.renderW = rw; state.renderH = rh;

  if (state.ping) { delTarget(state.ping); delTarget(state.pong); }
  state.bloomD.forEach(delTarget); state.bloomT.forEach(delTarget);
  state.ping = makeTarget(rw, rh);
  state.pong = makeTarget(rw, rh);
  state.bloomD = []; state.bloomT = [];
  let w = rw, h = rh;
  for (let i = 0; i < BLOOM_LEVELS; i++) {
    w = Math.max(1, w >> 1); h = Math.max(1, h >> 1);
    state.bloomD.push(makeTarget(w, h));
    state.bloomT.push(makeTarget(w, h));
  }
  state.resetAccum = true;
  state.frozen = false;
  state.frame = 0;
}

/* ---------- input ---------- */
if (!coarse) hintEl.classList.add('show');
setTimeout(() => hintEl.classList.remove('show'), 5000);

function setMouseFromEvent(e) {
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width;
  const y = 1.0 - (e.clientY - r.top) / r.height;
  state.mouse = [Math.min(1, Math.max(0.001, x)), Math.min(1, Math.max(0, y))];
}
if (!coarse && !reducedMotion) {
  canvas.addEventListener('pointerdown', (e) => {
    state.dragging = true;
    canvas.setPointerCapture(e.pointerId);
    setMouseFromEvent(e);
    hintEl.classList.remove('show');
    wake();
  });
  canvas.addEventListener('pointermove', (e) => {
    if (state.dragging) setMouseFromEvent(e);
  });
  const up = () => { state.dragging = false; };
  canvas.addEventListener('pointerup', up);
  canvas.addEventListener('pointercancel', up);
}

/* ---------- frame ---------- */
function draw(now) {
  if (state.frozen) { running = false; return; }
  requestAnimationFrame(draw);

  const T = TIERS[tier];

  // fps cap
  if (T.fpsCap) {
    const minDt = 1000 / T.fpsCap - 2;
    if (now - state.lastDraw < minDt) return;
  }
  state.lastDraw = now;

  // auto tier-down (skip if tier was forced by query param)
  if (!tierForced && state.stepdowns < 2 && tier < 2) {
    if (state.frame > state.measureStart) {
      if (state.lastT) state.dts.push(Math.min(now - state.lastT, 100));
      if (state.dts.length >= 50) {
        const avg = state.dts.reduce((a, b) => a + b, 0) / state.dts.length;
        state.dts = [];
        if (avg > 22) {
          tier = Math.min(tier + 1, 2);
          state.stepdowns++;
          state.measureStart = 30;
          rebuild();
          state.lastT = 0;
          return;
        }
      }
    }
    state.lastT = now;
  }

  const t = reducedMotion ? 12.0 : (now - state.t0) / 1000;

  // camera source
  let mouse = state.mouse;
  let dragging = state.dragging ? 1 : 0;
  let blend = 0.9;
  if (T.drift && !reducedMotion) {
    mouse = [0.35 + 0.08 * Math.sin(t * 0.05), 0.15 + 0.08 * Math.sin(t * 0.032 + 1.7)];
    blend = 0.85;
  } else if (coarse || T.freeze) {
    mouse = [0.35, 0.15];
  }
  if (state.resetAccum) { blend = 0; state.resetAccum = false; }

  const prev = state.ping, curr = state.pong;

  /* --- pass 1: render (buffer A) --- */
  gl.bindFramebuffer(gl.FRAMEBUFFER, curr.fbo);
  gl.viewport(0, 0, curr.w, curr.h);
  gl.useProgram(progRender.p);
  gl.uniform2f(progRender.u.iResolution, curr.w, curr.h);
  gl.uniform1f(progRender.u.iTime, t);
  gl.uniform2f(progRender.u.uMouse, mouse[0], mouse[1]);
  gl.uniform1f(progRender.u.uDragging, dragging);
  gl.uniform1f(progRender.u.uBlend, blend);
  gl.uniform1i(progRender.u.uIters, TIERS[tier].iters);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, noiseTex);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, dustTex);
  gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, prev.tex);
  gl.uniform1i(progRender.u.uNoise, 0);
  gl.uniform1i(progRender.u.uDust, 1);
  gl.uniform1i(progRender.u.uPrev, 2);
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  /* --- pass 2: bloom downsample chain --- */
  gl.useProgram(progDown.p);
  gl.uniform1i(progDown.u.uTex, 0);
  gl.activeTexture(gl.TEXTURE0);
  let src = curr.tex;
  for (let i = 0; i < BLOOM_LEVELS; i++) {
    const dst = state.bloomD[i];
    gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo);
    gl.viewport(0, 0, dst.w, dst.h);
    gl.uniform2f(progDown.u.uOutRes, dst.w, dst.h);
    gl.bindTexture(gl.TEXTURE_2D, src);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    src = dst.tex;
  }

  /* --- pass 3: gaussian blur per level (H then V) --- */
  gl.useProgram(progBlur.p);
  gl.uniform1i(progBlur.u.uTex, 0);
  for (let i = 0; i < BLOOM_LEVELS; i++) {
    const D = state.bloomD[i], Tt = state.bloomT[i];
    // horizontal: D -> T
    gl.bindFramebuffer(gl.FRAMEBUFFER, Tt.fbo);
    gl.viewport(0, 0, Tt.w, Tt.h);
    gl.uniform2f(progBlur.u.uOutRes, Tt.w, Tt.h);
    gl.uniform2f(progBlur.u.uDir, 1, 0);
    gl.bindTexture(gl.TEXTURE_2D, D.tex);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    // vertical: T -> D
    gl.bindFramebuffer(gl.FRAMEBUFFER, D.fbo);
    gl.viewport(0, 0, D.w, D.h);
    gl.uniform2f(progBlur.u.uOutRes, D.w, D.h);
    gl.uniform2f(progBlur.u.uDir, 0, 1);
    gl.bindTexture(gl.TEXTURE_2D, Tt.tex);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
  }

  /* --- pass 4: composite to screen --- */
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(progComposite.p);
  gl.uniform2f(progComposite.u.uOutRes, canvas.width, canvas.height);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, curr.tex);
  gl.uniform1i(progComposite.u.uScene, 0);
  for (let i = 0; i < BLOOM_LEVELS; i++) {
    gl.activeTexture(gl.TEXTURE1 + i);
    gl.bindTexture(gl.TEXTURE_2D, state.bloomD[i].tex);
    gl.uniform1i(progComposite.u['uB' + i], 1 + i);
  }
  gl.drawArrays(gl.TRIANGLES, 0, 3);

  // swap ping-pong
  state.pong = prev; state.ping = curr;
  state.frame++;

  // freeze tier: stop once temporally converged
  if (TIERS[tier].freeze && state.frame > 150) state.frozen = true;

  if (DEBUG && (state.frame & 15) === 0) {
    const dt = state.dts.length ? state.dts[state.dts.length - 1] : 0;
    debugEl.textContent =
      `tier   ${tier}${tierForced ? ' (forced)' : ''}\n` +
      `iters  ${TIERS[tier].iters}\n` +
      `render ${state.renderW}x${state.renderH}\n` +
      `canvas ${canvas.width}x${canvas.height}\n` +
      `dt     ${dt.toFixed(1)} ms\n` +
      `frame  ${state.frame}${state.frozen ? ' (frozen)' : ''}`;
  }
}

let running = false;
function wake() {
  state.frozen = false;
  if (!running) {
    running = true;
    requestAnimationFrame(draw);
  }
}

let resizeTimer = 0;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { rebuild(); wake(); }, 150);
});

canvas.addEventListener('webglcontextlost', (e) => {
  e.preventDefault();
  fail();
});

rebuild();
running = true;
requestAnimationFrame(draw);
</script>
</body>
</html>
