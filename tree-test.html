<meta charset="utf-8">
<title>Universe Tree — baked tree + live climate</title>
<style>
  html,body{margin:0;height:100%;background:#05060d;overflow:hidden;
    font:12px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#9ab}
  #c{display:block;width:100vw;height:100vh}
  .panel{position:fixed;background:rgba(10,16,30,.72);border:1px solid #1d2c48;
    border-radius:10px;padding:10px 12px;backdrop-filter:blur(6px)}
  #left{left:14px;top:14px;display:flex;flex-direction:column;gap:8px;width:200px}
  #left b{color:#bfe0ff;font-size:12px}
  .row{display:flex;justify-content:space-between;align-items:center;gap:8px}
  .row input[type=range]{width:110px;accent-color:#7fd0ff}
  .trees{display:flex;gap:6px;flex-wrap:wrap}
  .trees button{flex:1;min-width:40px;background:#132139;color:#9fd6ff;
    border:1px solid #26406a;border-radius:7px;padding:6px 4px;cursor:pointer;font-size:11px}
  .trees button.on{background:#204066;border-color:#4f86c8;color:#eaf6ff}
  #hud{left:14px;bottom:12px;color:#5a6f8a}
</style>
<canvas id="c"></canvas>
<div id="left" class="panel">
  <b>Curated tree (fixed shape)</b>
  <div class="trees" id="trees"></div>
  <div class="row"><span>entries (size)</span><input id="grow" type="range" min="10" max="100" value="100"></div>
  <hr style="border:none;border-top:1px solid #1d2c48;margin:2px 0">
  <b>Climate (live, cheap)</b>
  <div class="row"><span>hue</span><input id="hue" type="range" min="-180" max="180" value="0"></div>
  <div class="row"><span>warmth/energy</span><input id="energy" type="range" min="60" max="160" value="100"></div>
  <div class="row"><span>mist</span><input id="mist" type="range" min="0" max="100" value="35"></div>
  <div class="row"><span>heaviness</span><input id="heavy" type="range" min="0" max="100" value="20"></div>
</div>
<div id="hud" class="panel">One baked shape · climate = live hue + atmosphere. 60fps.</div>
<script>
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}

const cv=document.getElementById('c'),ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){DPR=Math.min(2,devicePixelRatio||1);W=innerWidth;H=innerHeight;
  cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0)}
addEventListener('resize',()=>{resize()});

// four curated base seeds (shapes we keep) + growth
const CURATED=[101,202,303,404];
let curSeed=CURATED[0], curGrow=100;
let bake=null, bakeMeta=null, stars=[];

// ---- space colonization -> node list (design-time; baked once) ----
function buildTree(seed, entries){
  const rnd=mulberry32(seed);
  const trunkH=880, canopyH=760, canopyW=560;
  const cloudCy=trunkH+canopyH*0.42;
  const n=Math.round(1000*(0.35+0.65*entries/100));
  const attr=[];
  for(let i=0;i<n;i++){const a=rnd()*6.2832, rr=Math.pow(rnd(),0.5), r=Math.pow(rnd(),0.6);
    attr.push({x:Math.cos(a)*rr*canopyW*(0.55+0.45*rnd()),
               y:cloudCy+(rnd()*2-1)*canopyH*0.5+Math.sin(a)*r*40, dead:false})}
  const D=17,infl=175,kill=32;
  const nodes=[{x:0,y:0,px:null}]; let guard=0;
  while(guard++<5000){
    let any=false; const pull=new Map();
    for(const a of attr){if(a.dead)continue; let best=-1,bd=infl;
      for(let i=0;i<nodes.length;i++){const d=Math.hypot(a.x-nodes[i].x,a.y-nodes[i].y);if(d<bd){bd=d;best=i}}
      if(best>=0){any=true;let p=pull.get(best);if(!p){p={x:0,y:0};pull.set(best,p)}
        const dx=a.x-nodes[best].x,dy=a.y-nodes[best].y,d=Math.hypot(dx,dy)||1;p.x+=dx/d;p.y+=dy/d}}
    if(!any){let best=0,bd=1e9;for(let i=0;i<nodes.length;i++){const d=Math.hypot(nodes[i].x,cloudCy-nodes[i].y);if(d<bd){bd=d;best=i}}
      const nx=nodes[best],dy=cloudCy-nx.y,jx=(rnd()*2-1)*0.1;
      nodes.push({x:nx.x+jx*D,y:nx.y+Math.sign(dy)*D,px:best});continue}
    for(const[i,p]of pull){const d=Math.hypot(p.x,p.y)||1,jx=(rnd()*2-1)*0.26;
      nodes.push({x:nodes[i].x+(p.x/d+jx)*D,y:nodes[i].y+(p.y/d)*D,px:i})}
    for(const a of attr){if(a.dead)continue;for(let i=0;i<nodes.length;i++){
      if(Math.hypot(a.x-nodes[i].x,a.y-nodes[i].y)<kill){a.dead=true;break}}}
    if(nodes.length>4600||attr.every(a=>a.dead))break;
  }
  const kids=nodes.map(()=>[]);
  for(let i=0;i<nodes.length;i++)if(nodes[i].px!=null)kids[nodes[i].px].push(i);
  const th=new Float32Array(nodes.length);
  (function c(i){if(!kids[i].length){th[i]=1.7;return 1.7}let s=0;for(const k of kids[i])s+=c(k)**2;return th[i]=Math.sqrt(s)+0.5})(0);
  const tips=[];for(let i=0;i<nodes.length;i++)if(!kids[i].length)tips.push(i);
  let mnX=1e9,mxX=-1e9,mnY=1e9,mxY=-1e9;
  for(const nd of nodes){mnX=Math.min(mnX,nd.x);mxX=Math.max(mxX,nd.x);mnY=Math.min(mnY,nd.y);mxY=Math.max(mxY,nd.y)}
  return{nodes,th,tips,mnX,mxX,mnY,mxY};
}

// ---- bake ONCE to an offscreen sprite in near-white luminance ----
function bakeTree(seed,entries){
  const T=buildTree(seed,entries);
  const pad=90, res=1;                 // world units ~= px
  const w=Math.ceil((T.mxX-T.mnX)+pad*2), h=Math.ceil((T.mxY-T.mnY)+pad*2);
  const off=document.createElement('canvas'); off.width=w*res; off.height=h*res;
  const g=off.getContext('2d'); g.scale(res,res);
  // world->local: y up. base(y=0) near bottom.
  const ox=-T.mnX+pad, oy=T.mxY+pad;   // local y = oy - worldY
  const X=x=>x+ox, Y=y=>oy-y;
  g.globalCompositeOperation='lighter'; g.lineCap='round'; g.lineJoin='round';
  const nodes=T.nodes;
  function pass(col,mul,al,blur){g.filter=blur?`blur(${blur}px)`:'none';g.strokeStyle=col;g.globalAlpha=al;
    for(let i=0;i<nodes.length;i++){const pi=nodes[i].px;if(pi==null)continue;const a=nodes[pi],b=nodes[i];
      g.lineWidth=Math.max(0.6,T.th[i]*mul);g.beginPath();g.moveTo(X(a.x),Y(a.y));g.lineTo(X(b.x),Y(b.y));g.stroke()}}
  // canopy aura: soft luminous mass behind branches
  const cxw=(T.mnX+T.mxX)/2, cyw=T.mnY+(T.mxY-T.mnY)*0.32;
  const aur=g.createRadialGradient(X(cxw),Y(cyw),10,X(cxw),Y(cyw),Math.max(w,h)*0.34);
  aur.addColorStop(0,'rgba(150,200,255,0.30)');aur.addColorStop(1,'rgba(120,170,255,0)');
  g.filter='blur(30px)';g.fillStyle=aur;g.fillRect(0,0,w,h);g.filter='none';
  pass('#2f5cff',2.4,0.30,10);   // wide outer glow
  pass('#5f9bff',1.35,0.5,3);    // mid glow
  pass('#9fc8ff',0.9,0.85,0);    // body
  pass('#eaf6ff',0.34,0.95,0);   // bright core
  g.filter='blur(1px)';g.fillStyle='#dff0ff';g.globalAlpha=0.9;
  for(const i of T.tips){const b=nodes[i];g.beginPath();g.arc(X(b.x),Y(b.y),2.4,0,6.28);g.fill()}
  g.filter='none';g.globalAlpha=1;g.globalCompositeOperation='source-over';
  return {canvas:off,w,h,baseLocalY:oy};   // baseLocalY = where world-y0 sits (ground contact)
}

function replant(){const b=bakeTree(curSeed,curGrow); bake=b.canvas; bakeMeta=b;
  const rnd=mulberry32(curSeed); stars=[];
  for(let i=0;i<240;i++)stars.push({x:rnd(),y:rnd()*0.82,z:0.3+rnd()*0.7,t:rnd()*6.28})}

// controls
const el=id=>document.getElementById(id);
function draw(now){
  const t=now/1000;
  const hue=+el('hue').value, energy=+el('energy').value/100,
        mist=+el('mist').value/100, heavy=+el('heavy').value/100;
  // sky (heaviness cools + darkens)
  const sky=ctx.createLinearGradient(0,0,0,H);
  const top=`hsl(${222+hue*0.2},${40-heavy*20}%,${8-heavy*3}%)`;
  sky.addColorStop(0,top);sky.addColorStop(0.6,'#0a0f1e');sky.addColorStop(1,'#05060d');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  for(const st of stars){const a=(0.25+0.6*Math.abs(Math.sin(t*0.6+st.t)))*st.z*(1-heavy*0.5);
    ctx.globalAlpha=a;ctx.fillStyle='#bcd6ff';ctx.fillRect(st.x*W,st.y*H,st.z*1.8,st.z*1.8)}
  ctx.globalAlpha=1;

  const groundY=H-64;
  // horizon dune placeholder
  ctx.fillStyle='#0c1120';ctx.beginPath();ctx.moveTo(0,groundY+6);
  for(let x=0;x<=W;x+=40)ctx.lineTo(x,groundY-16+Math.sin(x*0.006+2)*13);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.fill();

  // baked tree: fit height, base at groundY. breathing scale + climate hue via filter.
  const bh=bakeMeta.h, scale=(H-120)/bh, breathe=1+0.006*Math.sin(t*0.7);
  const dw=bakeMeta.w*scale*breathe, dh=bh*scale*breathe;
  const dx=W/2-dw/2, baseY=groundY-(bakeMeta.baseLocalY*scale*breathe)+dh;
  ctx.globalCompositeOperation='lighter';
  ctx.filter=`hue-rotate(${hue}deg) saturate(${0.7+energy*0.6}) brightness(${0.7+energy*0.5})`;
  // soft halo copy
  ctx.globalAlpha=0.5;ctx.drawImage(bake,dx-dw*0.04,groundY-dh, dw*1.08, dh);
  ctx.globalAlpha=1;ctx.drawImage(bake,dx,groundY-dh,dw,dh);
  ctx.filter='none';ctx.globalCompositeOperation='source-over';

  // mist band across ground
  if(mist>0){const mg=ctx.createLinearGradient(0,groundY-160,0,groundY+20);
    mg.addColorStop(0,'rgba(120,150,200,0)');mg.addColorStop(1,`rgba(140,170,210,${0.28*mist})`);
    ctx.fillStyle=mg;ctx.fillRect(0,groundY-160,W,190)}

  // rising motes (energy = more, lighter)
  const nm=Math.round(20+energy*40);
  for(let i=0;i<nm;i++){const p=(t*0.05+i*0.113)%1;ctx.globalAlpha=0.35*(1-p)*energy;
    ctx.fillStyle='#bfe0ff';const mx=W/2+Math.sin(i*12.9+t*0.2)*dw*0.42;
    ctx.fillRect(mx,groundY-p*H*0.72,1.6,1.6)}
  ctx.globalAlpha=1;

  // witness light
  const wx=W/2-dw*0.16,wy=groundY-44,wp=0.5+0.5*Math.sin(t*0.9);
  ctx.globalCompositeOperation='lighter';
  const wg=ctx.createRadialGradient(wx,wy,0,wx,wy,58);
  wg.addColorStop(0,`rgba(180,220,255,${0.45+0.3*wp})`);wg.addColorStop(1,'rgba(120,160,255,0)');
  ctx.fillStyle=wg;ctx.beginPath();ctx.arc(wx,wy,58,0,6.28);ctx.fill();
  ctx.globalCompositeOperation='source-over';

  const vg=ctx.createRadialGradient(W/2,H*0.5,H*0.32,W/2,H*0.5,H*0.78);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,`rgba(0,0,0,${0.5+heavy*0.25})`);
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  requestAnimationFrame(draw);
}

// build tree buttons
const tb=el('trees');
CURATED.forEach((s,i)=>{const b=document.createElement('button');b.textContent='Tree '+(i+1);
  b.onclick=()=>{curSeed=s;[...tb.children].forEach(c=>c.classList.remove('on'));b.classList.add('on');replant()};
  if(i===0)b.classList.add('on');tb.appendChild(b)});
el('grow').oninput=e=>{curGrow=+e.target.value;replant()};

resize();replant();requestAnimationFrame(draw);
</script>
