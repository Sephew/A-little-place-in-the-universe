<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Universe Tree — feasibility mockup</title>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;cursor:crosshair}
  canvas{display:block;width:100vw;height:100vh;touch-action:none}
  #witness{
    position:fixed;left:50%;bottom:12%;transform:translateX(-50%);
    max-width:min(80vw,640px);text-align:center;
    color:rgba(235,240,255,0.82);
    font:300 18px/1.6 ui-serif,Georgia,'Times New Roman',serif;
    letter-spacing:0.02em;pointer-events:none;
    opacity:0;transition:opacity 2s ease;text-shadow:0 0 18px rgba(120,180,255,0.25);
  }
  #witness.show{opacity:1}
  #hint{
    position:fixed;left:50%;bottom:max(18px,env(safe-area-inset-bottom));transform:translateX(-50%);
    color:rgba(255,255,255,0.28);font:11px/1 system-ui,sans-serif;letter-spacing:0.22em;
    text-transform:uppercase;pointer-events:none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="witness"></div>
<div id="hint">move to look &nbsp;·&nbsp; click to plant a new seed</div>

<script>
'use strict';
/* Universe Tree — throwaway Canvas2D feasibility mockup.
   Proves: seeded procedural tree, additive glow, parallax "3D" depth,
   ground plane + mist, drifting motes, faint background grove, a witness. */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { alpha:false });
const witnessEl = document.getElementById('witness');

let W=0,H=0,DPR=1;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 1.5);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W*DPR; canvas.height = H*DPR;
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
window.addEventListener('resize', resize); resize();

/* ---- deterministic PRNG (mulberry32) ---- */
function rngFrom(seed){
  let a = seed>>>0;
  return function(){
    a|=0; a=(a+0x6D2B79F5)|0;
    let t=Math.imul(a^(a>>>15),1|a);
    t=(t+Math.imul(t^(t>>>7),61|t))^t;
    return ((t^(t>>>14))>>>0)/4294967296;
  };
}

/* ---- palettes (the "universe decides" set) ---- */
const PALETTES = [
  { glow:[46,170,190],  core:[205,255,248], leaf:[150,240,255], ground:[30,120,140] }, // teal
  { glow:[205,140,55],  core:[255,242,205], leaf:[255,212,140], ground:[150,95,40]  }, // amber
  { glow:[150,95,215],  core:[240,222,255], leaf:[210,165,255], ground:[95,60,150]  }, // violet
  { glow:[210,92,120],  core:[255,218,228], leaf:[255,170,192], ground:[150,55,80]  }, // rose
];
const rgba=(c,a)=>`rgba(${c[0]},${c[1]},${c[2]},${a})`;

/* ---- build a tree into flat arrays (reseeded each frame -> stable structure, time -> sway) ---- */
function buildTree(seed, time, scale, windAmt){
  const r = rngFrom(seed);
  const pal = PALETTES[Math.floor(r()*PALETTES.length)];
  const segs=[], leaves=[];
  const baseLen = H*0.135*scale;
  const baseThick = Math.max(2, W*0.006)*scale;
  const maxDepth = 9;
  function branch(x,y,ang,len,thick,depth){
    // organic wind sway, stronger higher up (lower depth = closer to tips here we count down)
    const sway = Math.sin(time*0.0006 + depth*0.9 + x*0.012) * windAmt * ((maxDepth-depth)/maxDepth);
    const a = ang + sway;
    const x2 = x + Math.cos(a)*len;
    const y2 = y + Math.sin(a)*len;
    segs.push({x1:x,y1:y,x2,y2,thick,depth});
    if(depth<=0 || len<5*scale){ leaves.push({x:x2,y:y2,depth}); return; }
    const n = depth>6 ? 2 : (r()<0.55?2:3);
    for(let i=0;i<n;i++){
      const spread = (0.28+r()*0.5) * (i===0?-1:(i===1?1:(r()-0.5)));
      const bend = (r()-0.5)*0.25;
      branch(x2,y2, a+spread+bend, len*(0.72+r()*0.12), thick*0.72, depth-1);
    }
  }
  branch(0,0,-Math.PI/2 + (r()-0.5)*0.2, baseLen, baseThick, maxDepth);
  return {segs,leaves,pal};
}

function drawTree(tree, ox, oy, alpha){
  const {segs,leaves,pal}=tree;
  ctx.save(); ctx.translate(ox,oy);
  ctx.globalCompositeOperation='lighter'; ctx.lineCap='round';
  // under-glow pass
  for(const s of segs){
    ctx.strokeStyle=rgba(pal.glow, 0.05*alpha);
    ctx.lineWidth=s.thick*4;
    ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();
  }
  // core pass
  for(const s of segs){
    const b = 0.5+0.5*(s.depth/9);
    ctx.strokeStyle=rgba(pal.core, (0.22+0.5*b)*alpha);
    ctx.lineWidth=s.thick;
    ctx.beginPath();ctx.moveTo(s.x1,s.y1);ctx.lineTo(s.x2,s.y2);ctx.stroke();
  }
  // glowing buds
  for(const lf of leaves){
    const rad=(3+Math.random()*1.5); // faint twinkle
    const g=ctx.createRadialGradient(lf.x,lf.y,0,lf.x,lf.y,rad*4);
    g.addColorStop(0,rgba(pal.leaf,0.55*alpha));
    g.addColorStop(1,rgba(pal.leaf,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(lf.x,lf.y,rad*4,0,7);ctx.fill();
  }
  ctx.restore();
}

/* ---- persistent particle fields ---- */
function makeStars(seed){
  const r=rngFrom(seed),arr=[];
  for(let i=0;i<160;i++) arr.push({x:r(),y:r()*0.85,z:0.2+r()*0.8,s:r()*1.4+0.3,tw:r()*6});
  return arr;
}
function makeMotes(seed){
  const r=rngFrom(seed),arr=[];
  for(let i=0;i<46;i++) arr.push({x:(r()-0.5)*0.5,y:r(),z:0.4+r()*0.6,sp:0.02+r()*0.05,ph:r()*6});
  return arr;
}

/* ---- scene state ---- */
let seed = (Math.random()*1e9)|0;
let stars = makeStars(seed^0x9e37);
let motes = makeMotes(seed^0x51ed);
let mx=0.5,my=0.5, camx=0,camy=0;      // eased parallax
let tmx=0,tmy=0;

canvas.addEventListener('pointermove',e=>{ tmx=(e.clientX/W-0.5); tmy=(e.clientY/H-0.5); });
canvas.addEventListener('pointerdown',()=>{ replant(); });

/* ---- witness ---- */
const LINES=[
  "Welcome back. Tell us your story.",
  "You are heard.",
  "The tree seems to enjoy your stories.",
  "A meteor said hello. You are lucky.",
  "The universe seems so loud, yet it makes no sound.",
  "I saw that. That was hard, and you did it anyway.",
];
const PLANT_LINES=[
  "A new seed. Let us see what it becomes.",
  "Something begins.",
  "The universe decides your shape. Not you.",
];
let li=0;
function sayLine(txt){
  witnessEl.classList.remove('show');
  setTimeout(()=>{ witnessEl.textContent=txt; witnessEl.classList.add('show'); },700);
}
function cycleWitness(){
  sayLine(LINES[li%LINES.length]); li++;
  setTimeout(()=>witnessEl.classList.remove('show'), 6500);
}
setTimeout(cycleWitness, 1200);
setInterval(cycleWitness, 9000);

function replant(){
  seed=(Math.random()*1e9)|0;
  stars=makeStars(seed^0x9e37); motes=makeMotes(seed^0x51ed);
  sayLine(PLANT_LINES[(Math.random()*PLANT_LINES.length)|0]);
  setTimeout(()=>witnessEl.classList.remove('show'),6000);
}

/* ---- render loop ---- */
function frame(now){
  // ease parallax + slow auto drift
  mx += (tmx-mx)*0.05; my += (tmy-my)*0.05;
  const drift = Math.sin(now*0.00013)*0.15;
  camx = (mx+drift); camy = my;

  // background gradient (dark, faint horizon glow)
  const bg=ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#02030a'); bg.addColorStop(0.62,'#04060f'); bg.addColorStop(1,'#080a14');
  ctx.globalCompositeOperation='source-over';
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  const pal = PALETTES[Math.floor(rngFrom(seed)()*PALETTES.length)];
  const groundY = H*0.80;

  ctx.globalCompositeOperation='lighter';

  // starfield (parallax by depth z)
  for(const st of stars){
    const px=st.x*W - camx*40*st.z, py=st.y*H - camy*24*st.z;
    const tw=0.4+0.6*Math.abs(Math.sin(now*0.001+st.tw));
    ctx.fillStyle=`rgba(200,215,255,${0.5*tw*st.z})`;
    ctx.fillRect(px,py,st.s,st.s);
  }

  // faint background grove (past trees) — parallax, dim
  drawTree(buildTree(seed+7, now, 0.55, 0.05), W*0.30 - camx*60, groundY-4, 0.16);
  drawTree(buildTree(seed+19, now, 0.65, 0.05), W*0.72 - camx*80, groundY-2, 0.20);

  // ground plane: base glow + mist bands + settled grains
  const baseX = W*0.5 - camx*120;
  // reflected pool of light where trunk meets ground
  const pool=ctx.createRadialGradient(baseX,groundY,0,baseX,groundY,W*0.28);
  pool.addColorStop(0,rgba(pal.ground,0.30)); pool.addColorStop(1,rgba(pal.ground,0));
  ctx.fillStyle=pool; ctx.beginPath();ctx.ellipse(baseX,groundY,W*0.28,H*0.05,0,0,7);ctx.fill();
  // drifting mist bands
  for(let i=0;i<3;i++){
    const y=groundY+i*14+6, ph=now*0.00004*(i+1);
    const g=ctx.createLinearGradient(0,y,W,y);
    const off=(Math.sin(ph)*0.3+0.5);
    g.addColorStop(Math.max(0,off-0.4),rgba(pal.ground,0));
    g.addColorStop(off,rgba(pal.ground,0.10));
    g.addColorStop(Math.min(1,off+0.4),rgba(pal.ground,0));
    ctx.fillStyle=g; ctx.fillRect(0,y-9,W,18);
  }
  // settled glowing grains ("sand")
  const gr=rngFrom(seed^0xa55a);
  for(let i=0;i<40;i++){
    const gx=gr()*W - camx*120*0.6, gy=groundY+gr()*H*0.14;
    const tw=0.3+0.7*Math.abs(Math.sin(now*0.0015+i));
    ctx.fillStyle=rgba(pal.leaf,0.10*tw);
    ctx.fillRect(gx,gy,1.5,1.5);
  }

  // the tree
  drawTree(buildTree(seed, now, 1, 0.06), baseX, groundY, 1);

  // rising motes
  for(const m of motes){
    const t=((now*0.001*m.sp + m.ph)%1);
    const mxp = W*0.5 + m.x*W - camx*90*m.z;
    const myp = groundY - t*H*0.6;
    const a = Math.sin(t*Math.PI)*0.5*m.z;
    ctx.fillStyle=rgba(pal.leaf,a*0.6);
    const s=1+m.z*1.5; ctx.fillRect(mxp,myp,s,s);
  }

  // witness presence — a soft hovering light
  const wx=W*0.5 + W*0.22 - camx*70, wy=H*0.30 + Math.sin(now*0.0008)*10;
  const pulse=0.6+0.4*Math.sin(now*0.0016);
  const wg=ctx.createRadialGradient(wx,wy,0,wx,wy,46);
  wg.addColorStop(0,`rgba(220,235,255,${0.9*pulse})`);
  wg.addColorStop(0.3,`rgba(150,190,255,${0.4*pulse})`);
  wg.addColorStop(1,'rgba(120,170,255,0)');
  ctx.fillStyle=wg; ctx.beginPath();ctx.arc(wx,wy,46,0,7);ctx.fill();
  ctx.fillStyle=`rgba(255,255,255,${0.9*pulse})`; ctx.beginPath();ctx.arc(wx,wy,2.2,0,7);ctx.fill();

  // vignette
  ctx.globalCompositeOperation='source-over';
  const vg=ctx.createRadialGradient(W*0.5,H*0.5,H*0.3,W*0.5,H*0.55,H*0.9);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
